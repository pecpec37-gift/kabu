<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 株式投資クイズ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --accent3: #ffd700;
    --red: #ef4444;
    --green: #22c55e;
    --text: #e8f4f8;
    --text-dim: #8ba4b8;
    --ticker-bg: #050810;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Ticker tape */
  .ticker-wrap {
    background: var(--ticker-bg);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    padding: 6px 0;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
  }
  .ticker {
    display: flex;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    gap: 0;
  }
  .ticker-item {
    padding: 0 24px;
    display: inline-flex;
    gap: 8px;
  }
  .ticker-item .up { color: var(--green); }
  .ticker-item .down { color: var(--red); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== TOP SCREEN ===== */
  .logo-area {
    text-align: center;
    padding: 32px 0 24px;
  }
  .logo-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  .logo-sub {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 6px;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent2), #ff9a3c);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .genre-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .genre-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .genre-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(0,212,170,0.05));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .genre-card:hover::before { opacity: 1; }
  .genre-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,212,170,0.15);
  }
  .genre-card.selected {
    border-color: var(--accent);
    background: rgba(0,212,170,0.08);
    box-shadow: 0 0 0 2px rgba(0,212,170,0.3);
  }
  .genre-icon { font-size: 32px; margin-bottom: 8px; }
  .genre-name { font-size: 14px; font-weight: 700; }
  .genre-count { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .rules-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
  }
  .rules-box strong { color: var(--accent); }
  .rules-box .rule-row { display: flex; gap: 8px; align-items: flex-start; margin: 4px 0; }

  .name-input-area {
    margin: 20px 0;
  }
  .name-input-area label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 8px; }
  .name-input-area input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input-area input:focus { border-color: var(--accent); }

  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00b38a);
    color: #0a0e1a;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,170,0.4); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== GAME SCREEN ===== */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .question-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent3);
  }

  .timer-area {
    margin-bottom: 16px;
  }
  .timer-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 1s linear, background-color 0.3s;
    border-radius: 4px;
  }
  .timer-bar.danger { background: linear-gradient(90deg, var(--red), #ff9a3c); }
  .timer-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    text-align: center;
    color: var(--accent3);
    margin-top: 6px;
    transition: color 0.3s;
  }
  .timer-text.danger { color: var(--red); animation: pulse 0.5s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .question-type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .badge-4choice { background: rgba(0,212,170,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .badge-truefalse { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid var(--accent2); }

  .question-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 16px;
    min-height: 80px;
  }
  .question-genre-tag {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }
  .question-text {
    font-size: clamp(15px, 3.5vw, 18px);
    font-weight: 700;
    line-height: 1.7;
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .choices-grid.truefalse {
    grid-template-columns: 1fr 1fr;
  }
  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(13px, 2.8vw, 15px);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    line-height: 1.5;
    position: relative;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,170,0.06);
  }
  .choice-btn.truefalse-btn {
    text-align: center;
    font-size: 20px;
    padding: 20px;
    font-weight: 900;
  }
  .choice-btn.correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.15);
    color: var(--green);
  }
  .choice-btn.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.15);
    color: var(--red);
  }
  .choice-btn:disabled { cursor: default; }
  .choice-label {
    display: inline-block;
    background: var(--border);
    color: var(--text-dim);
    border-radius: 4px;
    width: 20px;
    height: 20px;
    text-align: center;
    line-height: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .feedback-bar {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.3s;
  }
  .feedback-bar.show { opacity: 1; transform: translateY(0); }
  .feedback-bar.correct-fb { background: rgba(34,197,94,0.15); border: 1px solid var(--green); color: var(--green); }
  .feedback-bar.wrong-fb { background: rgba(239,68,68,0.15); border: 1px solid var(--red); color: var(--red); }

  /* ===== RESULT SCREEN ===== */
  .result-hero {
    text-align: center;
    padding: 32px 0 24px;
  }
  .result-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 15vw, 100px);
    line-height: 1;
    letter-spacing: 4px;
  }
  .rank-S { color: var(--accent3); text-shadow: 0 0 40px rgba(255,215,0,0.5); }
  .rank-A { color: var(--green); }
  .rank-B { color: var(--accent); }
  .rank-C { color: var(--text-dim); }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 10px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--accent3);
  }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .total-score-display {
    text-align: center;
    margin: 16px 0;
    background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(255,215,0,0.05));
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 16px;
    padding: 20px;
  }
  .total-score-label { font-size: 12px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
  .total-score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 14vw, 96px);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .total-score-breakdown { font-size: 12px; color: var(--text-dim); margin-top: 6px; font-family: 'Share Tech Mono', monospace; }

  .wrong-review {
    margin: 16px 0;
  }
  .wrong-review-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .wrong-item {
    background: var(--surface);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .wrong-item-q { font-size: 13px; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .wrong-item-a { font-size: 13px; color: var(--green); display: flex; gap: 8px; align-items: flex-start; }
  .wrong-item-genre { font-size: 10px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; margin-bottom: 4px; }

  .btn-secondary {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    margin-top: 10px;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Responsive */
  @media (max-width: 480px) {
    .genre-grid { grid-template-columns: 1fr 1fr; }
    .choices-grid { grid-template-columns: 1fr; }
    .choices-grid.truefalse { grid-template-columns: 1fr 1fr; }
    .result-stats { grid-template-columns: repeat(3, 1fr); }
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .screen.active { animation: fadeInUp 0.35s ease; }

  /* Chart candlestick decoration */
  .chart-deco {
    position: fixed;
    bottom: 0;
    right: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    padding: 16px;
    text-align: right;
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- Ticker Tape -->
<div class="ticker-wrap">
  <div class="ticker" id="ticker">
    <!-- filled by JS -->
  </div>
</div>

<div class="container">

  <!-- ===== TOP SCREEN ===== -->
  <div class="screen active" id="screen-top">
    <div class="logo-area">
      <div class="logo-main">株式道場</div>
      <div class="logo-sub">Stock Quiz Master</div>
      <div class="logo-badge">📈 150問以上収録</div>
    </div>

    <div class="name-input-area" style="margin-bottom:16px">
      <label>プレーヤー名（任意）</label>
      <input type="text" id="player-name" placeholder="例：株マスター" maxlength="16">
    </div>

    <div style="font-size:13px;color:var(--accent);text-align:center;margin-bottom:10px;font-weight:700;letter-spacing:1px">
      👇 ジャンルをタップするとすぐにスタート！
    </div>

    <div class="genre-grid" id="genre-grid">
      <!-- filled by JS -->
    </div>

    <div class="rules-box">
      <div class="rule-row"><span>📋</span><span>各ジャンルから<strong>10問ランダム出題</strong>（4択＋○×ミックス）</span></div>
      <div class="rule-row"><span>⏱</span><span>制限時間 <strong>120秒</strong>スタート</span></div>
      <div class="rule-row"><span>✅</span><span>正解 → <strong>+10点</strong> ＋ 時間<strong>+5秒</strong></span></div>
      <div class="rule-row"><span>❌</span><span>不正解 → 減点なし ＋ 時間<strong>−5秒</strong></span></div>
      <div class="rule-row"><span>🏆</span><span>残り時間がそのまま<strong>ボーナス点</strong>に加算</span></div>
    </div>

    <button class="btn-start" id="btn-start" disabled>👆 上のジャンルをタップしてスタート！</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div class="screen" id="screen-game">
    <div class="game-header">
      <div class="question-counter" id="q-counter">問 1 / 10</div>
      <div class="score-display" id="score-display">0 PT</div>
    </div>

    <div class="timer-area">
      <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      <div class="timer-text" id="timer-text">120</div>
    </div>

    <div class="feedback-bar" id="feedback-bar"></div>

    <div class="question-box">
      <div class="question-genre-tag" id="q-genre-tag"></div>
      <div id="question-type-badge"></div>
      <div class="question-text" id="question-text"></div>
    </div>

    <div class="choices-grid" id="choices-grid"></div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div class="screen" id="screen-result">
    <div class="result-hero">
      <div class="result-rank" id="result-rank">A</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:4px;" id="result-player-name"></div>
    </div>

    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-correct">0</div>
        <div class="stat-label">✅ 正解</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-wrong">0</div>
        <div class="stat-label">❌ 不正解</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-bonus">0</div>
        <div class="stat-label">⏱ タイムボーナス</div>
      </div>
    </div>

    <div class="total-score-display">
      <div class="total-score-label">TOTAL SCORE</div>
      <div class="total-score-value" id="total-score">0</div>
      <div class="total-score-breakdown" id="score-breakdown"></div>
    </div>

    <div class="wrong-review" id="wrong-review"></div>

    <button class="btn-start" id="btn-retry">🔄 もう一度挑戦</button>
    <button class="btn-secondary" id="btn-back">← トップへ戻る</button>
  </div>

</div>

<div class="chart-deco" id="chart-deco"></div>

<script>
// ============================================================
// QUESTION BANK (150問以上)
// ============================================================
const GENRES = [
  { id: 'basic',    name: '株の基本',    icon: '📚', color: '#00d4aa' },
  { id: 'analysis', name: 'チャート分析', icon: '📊', color: '#ffd700' },
  { id: 'terms',    name: '経済用語',    icon: '💼', color: '#ff6b35' },
  { id: 'strategy', name: '投資戦略',    icon: '🎯', color: '#a78bfa' },
  { id: 'world',    name: '世界の市場',  icon: '🌏', color: '#38bdf8' },
];

// type: 'mc' = 4択, 'tf' = ○×
const QUESTIONS = {
  basic: [
    { type:'mc', q:'株式会社が資金調達のために発行する有価証券を何という？', choices:['株式','社債','国債','手形'], answer:0 },
    { type:'mc', q:'東京証券取引所の株式市場において、最も規模が大きい市場はどれか？', choices:['プライム市場','スタンダード市場','グロース市場','JASDAQ'], answer:0 },
    { type:'mc', q:'株価収益率（PER）の計算式は？', choices:['株価÷1株当たり純利益','純利益÷株価','株価×発行株数','売上高÷株価'], answer:0 },
    { type:'mc', q:'配当利回りの計算式として正しいのは？', choices:['1株配当÷株価×100','株価÷配当×100','純利益÷株数×100','時価総額÷純利益'], answer:0 },
    { type:'mc', q:'株価純資産倍率（PBR）が1倍を下回る場合、一般的にどのような状態を示す？', choices:['株価が解散価値より低い','株価が割高','業績が好調','成長期待が高い'], answer:0 },
    { type:'mc', q:'信用取引で株を借りて売る手法を何という？', choices:['空売り','信用買い','現物買い','つなぎ売り'], answer:0 },
    { type:'mc', q:'株式の売買において、売り注文と買い注文が一致して取引が成立することを何という？', choices:['約定','発注','清算','決済'], answer:0 },
    { type:'mc', q:'東証プライム市場への上場維持基準として、流通株式時価総額は最低いくら必要か？', choices:['100億円以上','10億円以上','50億円以上','500億円以上'], answer:0 },
    { type:'mc', q:'権利確定日の翌営業日（権利落ち日）に株価が下落する現象を何という？', choices:['権利落ち','配当落ち','株式分割','増資'], answer:0 },

// ============================================================
let selectedGenre = null;

function buildGenreGrid() {
  const grid = document.getElementById('genre-grid');
  grid.innerHTML = GENRES.map(g => `
    <div class="genre-card" data-genre="${g.id}" id="genre-card-${g.id}">
      <div class="genre-icon">${g.icon}</div>
      <div class="genre-name">${g.name}</div>
      <div class="genre-count">${QUESTIONS[g.id].length}問収録</div>
      <div style="font-size:10px;color:var(--accent);margin-top:6px;letter-spacing:1px">▶ タップでスタート</div>
    </div>
  `).join('');
  grid.querySelectorAll('.genre-card').forEach(card => {
    card.addEventListener('click', () => selectGenre(card.dataset.genre));
  });
}

function selectGenre(id) {
  selectedGenre = id;
  document.querySelectorAll('.genre-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('genre-card-' + id).classList.add('selected');
  document.getElementById('btn-start').disabled = false;
  // 視覚フィードバック後に自動スタート
  setTimeout(() => startGame(), 400);
}

// ============================================================
// GAME STATE
// ============================================================
let gameQuestions = [];
let currentQ = 0;
let score = 0;
let timeLeft = 120;
let timerInterval = null;
let wrongItems = [];
let answered = false;
let playerName = '';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  playerName = document.getElementById('player-name').value.trim() || 'プレーヤー';
  const pool = QUESTIONS[selectedGenre];
  gameQuestions = shuffle(pool).slice(0, 10);
  currentQ = 0;
  score = 0;
  timeLeft = 120;
  wrongItems = [];

  showScreen('screen-game');
  renderQuestion();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function updateTimerUI() {
  const bar = document.getElementById('timer-bar');
  const text = document.getElementById('timer-text');
  const pct = Math.max(0, (timeLeft / 120) * 100);
  bar.style.width = pct + '%';
  text.textContent = timeLeft;
  const danger = timeLeft <= 20;
  bar.classList.toggle('danger', danger);
  text.classList.toggle('danger', danger);
}

function renderQuestion() {
  const q = gameQuestions[currentQ];
  const genreInfo = GENRES.find(g => g.id === selectedGenre);

  document.getElementById('q-counter').textContent = `問 ${currentQ + 1} / 10`;
  document.getElementById('score-display').textContent = score + ' PT';
  document.getElementById('q-genre-tag').textContent = genreInfo.icon + ' ' + genreInfo.name;

  const badge = document.getElementById('question-type-badge');
  badge.innerHTML = q.type === 'mc'
    ? '<span class="question-type-badge badge-4choice">4択問題</span>'
    : '<span class="question-type-badge badge-truefalse">○×問題</span>';

  document.getElementById('question-text').textContent = q.q;

  const grid = document.getElementById('choices-grid');
  answered = false;
  document.getElementById('feedback-bar').classList.remove('show', 'correct-fb', 'wrong-fb');

  if (q.type === 'mc') {
    const shuffledChoices = shuffle(q.choices.map((c, i) => ({ text: c, orig: i })));
    grid.className = 'choices-grid';
    grid.innerHTML = shuffledChoices.map((c, i) => `
      <button class="choice-btn" data-correct="${c.orig === q.answer}">
        <span class="choice-label">${String.fromCharCode(65+i)}</span>${c.text}
      </button>
    `).join('');

    // isCorrect を data属性から読み取りリスナー登録
    grid.querySelectorAll('.choice-btn').forEach((btn, i) => {
      const isCorrect = (shuffledChoices[i].orig === q.answer);
      btn.dataset.isCorrect = isCorrect;
      btn.addEventListener('click', () => answer(isCorrect, btn));
    });
  } else {
    grid.className = 'choices-grid truefalse';
    grid.innerHTML = `
      <button class="choice-btn truefalse-btn" data-correct="${q.answer === true}">⭕ 正しい</button>
      <button class="choice-btn truefalse-btn" data-correct="${q.answer === false}">❌ 違う</button>
    `;
    grid.querySelectorAll('.choice-btn').forEach(btn => {
      const isCorrect = btn.dataset.correct === 'true';
      btn.dataset.isCorrect = isCorrect;
      btn.addEventListener('click', () => answer(isCorrect, btn));
    });
  }
}

function answer(isCorrect, btn, choiceIdx) {
  if (answered) return;
  answered = true;

  const q = gameQuestions[currentQ];
  const grid = document.getElementById('choices-grid');
  const fb = document.getElementById('feedback-bar');

  // Disable all buttons
  grid.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.isCorrect === 'true') b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    score += 10;
    timeLeft = Math.min(timeLeft + 5, 999);
    fb.textContent = '✅ 正解！ ＋10点 ＋5秒';
    fb.className = 'feedback-bar show correct-fb';
  } else {
    btn.classList.add('wrong');
    timeLeft = Math.max(0, timeLeft - 5);
    const correctText = q.type === 'mc' ? q.choices[q.answer] : (q.answer ? '正しい' : '違う');
    fb.textContent = `❌ 正解は「${correctText}」（−5秒）`;
    fb.className = 'feedback-bar show wrong-fb';
    wrongItems.push(q);
  }

  updateTimerUI();
  document.getElementById('score-display').textContent = score + ' PT';

  setTimeout(() => {
    currentQ++;
    if (currentQ < 10) {
      renderQuestion();
    } else {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1800);
}

function endGame() {
  clearInterval(timerInterval);
  const bonus = Math.max(0, timeLeft);
  const total = score + bonus;
  const correct = gameQuestions.filter((q, i) => !wrongItems.includes(q)).length;
  // Actually recalculate
  const correctCount = 10 - wrongItems.length;
  const wrongCount = wrongItems.length;

  // Rank
  let rank, rankClass;
  if (total >= 180) { rank = 'S'; rankClass = 'rank-S'; }
  else if (total >= 130) { rank = 'A'; rankClass = 'rank-A'; }
  else if (total >= 80) { rank = 'B'; rankClass = 'rank-B'; }
  else { rank = 'C'; rankClass = 'rank-C'; }

  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-rank').className = 'result-rank ' + rankClass;
  document.getElementById('result-player-name').textContent = playerName + ' さん';
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-bonus').textContent = '+' + bonus;
  document.getElementById('total-score').textContent = total;
  document.getElementById('score-breakdown').textContent = `正解×10点(${score}pt) ＋ 残り時間ボーナス(${bonus}pt)`;

  // Wrong review
  const wr = document.getElementById('wrong-review');
  if (wrongItems.length > 0) {
    const genreInfo = GENRES.find(g => g.id === selectedGenre);
    wr.innerHTML = `<div class="wrong-review-title">❌ 間違えた問題の復習（${wrongItems.length}問）</div>` +
      wrongItems.map((q, i) => {
        const correctText = q.type === 'mc' ? q.choices[q.answer] : (q.answer ? '正しい（○）' : '違う（×）');
        return `<div class="wrong-item">
          <div class="wrong-item-genre">${genreInfo.icon} ${genreInfo.name} | ${q.type === 'mc' ? '4択' : '○×'}</div>
          <div class="wrong-item-q">Q. ${q.q}</div>
          <div class="wrong-item-a">✅ <span>正解：${correctText}</span></div>
        </div>`;
      }).join('');
  } else {
    wr.innerHTML = '<div style="text-align:center;color:var(--accent);font-weight:700;padding:16px">🎉 全問正解！素晴らしい！</div>';
  }

  showScreen('screen-result');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTop() {
  clearInterval(timerInterval);
  selectedGenre = null;
  document.querySelectorAll('.genre-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-start').textContent = 'ジャンルを選んでスタート ▶';
  document.getElementById('btn-start').classList.remove('ready');
  showScreen('screen-top');
}
